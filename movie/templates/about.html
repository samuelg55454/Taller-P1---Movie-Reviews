<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About — Cine Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --amber: #f59e0b; }
        body { background: var(--bg); color: #e5e5e5; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .nav-cine { background: var(--surface) !important; border-bottom: 1px solid #2a2a2a; }
        .nav-cine .nav-link { color: #a3a3a3; }
        .nav-cine .nav-link:hover, .nav-cine .brand { color: var(--amber) !important; }
        .about-box { background: var(--surface); border: 1px solid #2a2a2a; border-radius: 12px; padding: 2rem; }
        .about-box .btn-amber { background: var(--amber); border: none; color: #0f0f0f; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg nav-cine py-3">
        <div class="container">
            <a class="navbar-brand brand fw-bold" href="{% url 'home' %}">Cine Vault</a>
            <div class="navbar-nav gap-3">
                <a class="nav-link" href="{% url 'statistics' %}">Statistics</a>
                <a class="nav-link" href="{% url 'news' %}">News</a>
                <a class="nav-link" href="{% url 'about' %}">About</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="about-box">
            <h1 class="h3 fw-bold mb-3">About</h1>
            <p class="text-secondary mb-4">Cine Vault is a movie catalog and review site. Search your favorite films and explore links to more information. Statistics and news live in their own sections.</p>
            <a href="{% url 'home' %}" class="btn btn-amber">Back to home</a>
        </div>
    </div>
</body>
</html>
