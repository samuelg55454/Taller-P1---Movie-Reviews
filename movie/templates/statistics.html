<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics — Cine Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --amber: #f59e0b; --teal: #14b8a6; --muted: #737373; }
        body { background: var(--bg); color: #e5e5e5; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .nav-cine { background: var(--surface) !important; border-bottom: 1px solid #2a2a2a; }
        .nav-cine .nav-link { color: #a3a3a3; }
        .nav-cine .nav-link:hover, .nav-cine .brand { color: var(--amber) !important; }
        .chart-box { background: var(--surface); border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; }
        .stat-badge { background: linear-gradient(135deg, var(--amber) 0%, #d97706 100%); color: #0f0f0f; padding: 0.75rem 1.25rem; border-radius: 10px; font-weight: 700; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg nav-cine py-3">
        <div class="container">
            <a class="navbar-brand brand fw-bold" href="{% url 'home' %}">Cine Vault</a>
            <div class="navbar-nav gap-3">
                <a class="nav-link" href="{% url 'statistics' %}">Statistics</a>
                <a class="nav-link" href="{% url 'news' %}">News</a>
                <a class="nav-link" href="{% url 'about' %}">About</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="d-flex align-items-center gap-3 mb-4">
            <h1 class="h3 mb-0 fw-bold">Statistics</h1>
            <span class="stat-badge">{{ total_movies }} films</span>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="chart-box">
                    <h6 class="text-uppercase text-muted small mb-3">Movies by year (top 10)</h6>
                    <canvas id="barChartYear" height="260"></canvas>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="chart-box">
                    <h6 class="text-uppercase text-muted small mb-3">Movies by genre (top 10)</h6>
                    <canvas id="barChartGenre" height="260"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const byYear = {{ by_year_json|safe }};
        const byGenre = {{ by_genre_json|safe }};
        Chart.defaults.color = '#a3a3a3';
        Chart.defaults.borderColor = '#2a2a2a';

        new Chart(document.getElementById('barChartYear').getContext('2d'), {
            type: 'bar',
            data: {
                labels: byYear.map(d => d.year),
                datasets: [{
                    label: 'Movies',
                    data: byYear.map(d => d.count),
                    backgroundColor: 'rgba(245, 158, 11, 0.8)',
                    borderColor: '#f59e0b',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });

        new Chart(document.getElementById('barChartGenre').getContext('2d'), {
            type: 'bar',
            data: {
                labels: byGenre.map(d => d.genre),
                datasets: [{
                    label: 'Movies',
                    data: byGenre.map(d => d.count),
                    backgroundColor: 'rgba(20, 184, 166, 0.8)',
                    borderColor: '#14b8a6',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                indexAxis: 'y',
                scales: { x: { beginAtZero: true } }
            }
        });
    </script>
</body>
</html>
