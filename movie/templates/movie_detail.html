<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ movie.title }} — Cine Vault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f0f0f; --surface: #1a1a1a; --amber: #f59e0b; }
        body { background: var(--bg); color: #e5e5e5; font-family: 'Outfit', sans-serif; min-height: 100vh; }
        .nav-cine { background: var(--surface) !important; border-bottom: 1px solid #2a2a2a; }
        .nav-cine .nav-link { color: #a3a3a3; }
        .nav-cine .nav-link:hover, .nav-cine .brand { color: var(--amber) !important; }
        .detail-panel { background: var(--surface); border: 1px solid #2a2a2a; border-radius: 12px; overflow: hidden; }
        .detail-img { max-height: 420px; object-fit: cover; width: 100%; }
        .detail-body { padding: 1.5rem 2rem; }
        .btn-amber { background: var(--amber); border: none; color: #0f0f0f; font-weight: 600; }
        .btn-outline-amber { background: transparent; border: 1px solid #2a2a2a; color: #a3a3a3; }
        .btn-outline-amber:hover { border-color: var(--amber); color: var(--amber); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg nav-cine py-3">
        <div class="container">
            <a class="navbar-brand brand fw-bold" href="{% url 'home' %}">Cine Vault</a>
            <div class="navbar-nav gap-3">
                <a class="nav-link" href="{% url 'statistics' %}">Statistics</a>
                <a class="nav-link" href="{% url 'news' %}">News</a>
                <a class="nav-link" href="{% url 'about' %}">About</a>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="detail-panel">
            <div class="row g-0">
                <div class="col-md-5">
                    <img src="{{ movie.image.url }}" class="detail-img" alt="{{ movie.title }}" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%27300%27 height=%27450%27%3E%3Crect fill=%27%231a1a1a%27 width=%27300%27 height=%27450%27/%3E%3Ctext fill=%27%23f59e0b%27 x=%2750%25%27 y=%2750%25%27 dominant-baseline=%27middle%27 text-anchor=%27middle%27 font-family=%27sans-serif%27 font-size=%2720%27%3ENo Poster%3C/text%3E%3C/svg%3E';">
                </div>
                <div class="col-md-7">
                    <div class="detail-body">
                        <h1 class="h3 fw-bold mb-3">{{ movie.title }}</h1>
                        <p class="text-secondary mb-4">{{ movie.description }}</p>
                        {% if movie.url %}
                            <a href="{{ movie.url }}" class="btn btn-amber me-2" target="_blank" rel="noopener">External link</a>
                        {% endif %}
                        <a href="{% url 'home' %}" class="btn btn-outline-amber">Back to list</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
